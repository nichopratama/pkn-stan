apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: pkn-stan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80